<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="theme-init.js"></script>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="tabs">
        <button class="tab active" data-tab="simple">Trajet simple</button>
        <button class="tab" data-tab="retour">Retour Blois</button>
        <button class="tab" data-tab="multi">Trajet multiple</button>
    </div>

    <div class="prefs-row">
        <button class="pref-chip" id="historyToggle" role="switch" aria-checked="true" aria-label="Activer ou désactiver l'autocomplétion">Autocomplétion</button>
        <button class="pref-chip" id="retourMemoryToggle" role="switch" aria-checked="false" aria-label="Mémoriser les RDVs pour la prochaine ouverture">Mémoriser</button>
        <button class="theme-toggle" id="themeToggle" aria-label="Changer le thème"></button>
    </div>

    <!-- Mode simple -->
    <div id="modeSimple">
        <div class="card">
            <div class="input-row">
                <div class="autocomplete-wrap">
                    <span class="field-label">Départ</span>
                    <input type="text" id="start" placeholder="Ville ou adresse" autocomplete="off">
                    <div class="suggestions" id="startSuggestions"></div>
                </div>
                <button id="fromBloisBtn" class="home-btn" title="Utiliser Blois comme départ" aria-label="Utiliser Blois comme point de départ">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                </button>
            </div>

            <div class="input-row">
                <div class="autocomplete-wrap">
                    <span class="field-label">Arrivée</span>
                    <input type="text" id="end" placeholder="Ville de destination" autocomplete="off">
                    <div class="suggestions" id="endSuggestions"></div>
                </div>
            </div>

            <button class="swap-row" id="swapBtn">
                <div class="swap-icon-wrap">
                    <span class="swap-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="2" x2="12" y2="22"/>
                            <polyline points="17 7 12 2 7 7"/>
                            <polyline points="7 17 12 22 17 17"/>
                        </svg>
                    </span>
                </div>
                <span class="swap-label">Inverser départ et arrivée</span>
            </button>
        </div>

        <button id="calcBtn" class="btn-calc">Calculer le trajet</button>
        <div id="result" class="result-box"></div>
    </div>

    <!-- Mode retour Blois -->
    <div id="modeRetour" style="display:none">
        <div class="card">
            <div class="input-row">
                <div class="autocomplete-wrap">
                    <span class="field-label">Vous êtes à</span>
                    <input type="text" id="retourStart" placeholder="Position actuelle" autocomplete="off">
                    <div class="suggestions" id="retourStartSuggestions"></div>
                </div>
                <button id="retourFromBloisBtn" class="home-btn" title="Partir de Blois" aria-label="Utiliser Blois comme point de départ">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                </button>
            </div>

            <div id="retourStopsContainer"></div>
            <button class="add-stop-row" id="addStopBtn">
                <div class="swap-icon-wrap">
                    <span class="add-stop-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </span>
                </div>
                <span class="add-stop-label">Ajouter un RDV</span>
            </button>

            <div class="dest-fixed-row">
                <span class="dest-fixed-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                </span>
                <div class="dest-fixed-inner">
                    <span class="dest-fixed-label">Destination finale</span>
                    <span class="dest-fixed-val">Blois, 41000</span>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <button id="calcRetourBtn" class="btn-calc">Calculer le détour</button>
            <button id="clearRetourBtn" class="btn-clear" title="Tout effacer">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
        </div>
        <div id="resultRetour" class="result-box"></div>
    </div>

    <!-- Mode trajet multiple -->
    <div id="modeMulti" style="display:none">
        <div class="card">
            <div class="input-row">
                <div class="autocomplete-wrap">
                    <span class="field-label">Départ</span>
                    <input type="text" id="multiStart" placeholder="Ville de départ" autocomplete="off">
                    <div class="suggestions" id="multiStartSuggestions"></div>
                </div>
                <button id="multiStartBloisBtn" class="home-btn" title="Partir de Blois" aria-label="Utiliser Blois comme point de départ">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                </button>
            </div>

            <div id="multiStopsContainer"></div>
            <button class="add-stop-row" id="addMultiStopBtn">
                <div class="swap-icon-wrap">
                    <span class="add-stop-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </span>
                </div>
                <span class="add-stop-label">Ajouter un RDV</span>
            </button>

            <div class="input-row multi-end-row">
                <div class="autocomplete-wrap">
                    <span class="field-label">Arrivée</span>
                    <input type="text" id="multiEnd" placeholder="Destination finale" autocomplete="off">
                    <div class="suggestions" id="multiEndSuggestions"></div>
                </div>
                <button id="multiEndBloisBtn" class="home-btn" title="Utiliser Blois comme destination" aria-label="Utiliser Blois comme destination">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="btn-row">
            <button id="calcMultiBtn" class="btn-calc">Calculer le trajet</button>
            <button id="clearMultiBtn" class="btn-clear" title="Tout effacer">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
        </div>
        <div id="resultMulti" class="result-box"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
